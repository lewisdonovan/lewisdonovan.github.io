name: github pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Move 404 file
        run: |
          cp ./public/404/index.html ./public/404.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: lewisdonovan.dev

      - name: Remove File
        uses: JesseTG/rm@v1.0.3
        with:
          path: /.nojekyll